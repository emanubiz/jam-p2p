name: Build Jam P2P

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: Linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            name: macOS-Intel
          - os: macos-latest
            target: aarch64-apple-darwin
            name: macOS-AppleSilicon
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: Windows-x86_64

    runs-on: ${{ matrix.platform.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Install Linux dependencies
        if: matrix.platform.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libasound2-dev \
            pkg-config

      - name: Install Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: jam-gui/src-tauri

      - name: Install frontend dependencies
        working-directory: jam-gui
        run: npm install

      - name: Build Tauri app
        working-directory: jam-gui
        run: npm run tauri build -- --target ${{ matrix.platform.target }}

      - name: Upload Linux artifacts (AppImage)
        if: matrix.platform.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: jam-p2p-${{ matrix.platform.name }}-AppImage
          path: jam-gui/src-tauri/target/${{ matrix.platform.target }}/release/bundle/appimage/*.AppImage

      - name: Upload Linux artifacts (deb)
        if: matrix.platform.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: jam-p2p-${{ matrix.platform.name }}-deb
          path: jam-gui/src-tauri/target/${{ matrix.platform.target }}/release/bundle/deb/*.deb

      - name: Upload macOS artifacts (dmg)
        if: matrix.platform.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: jam-p2p-${{ matrix.platform.name }}-dmg
          path: jam-gui/src-tauri/target/${{ matrix.platform.target }}/release/bundle/dmg/*.dmg

      - name: Upload macOS artifacts (app)
        if: matrix.platform.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: jam-p2p-${{ matrix.platform.name }}-app
          path: jam-gui/src-tauri/target/${{ matrix.platform.target }}/release/bundle/macos/*.app

      - name: Upload Windows artifacts (msi)
        if: matrix.platform.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: jam-p2p-${{ matrix.platform.name }}-msi
          path: jam-gui/src-tauri/target/${{ matrix.platform.target }}/release/bundle/msi/*.msi

      - name: Upload Windows artifacts (exe)
        if: matrix.platform.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: jam-p2p-${{ matrix.platform.name }}-exe
          path: jam-gui/src-tauri/target/${{ matrix.platform.target }}/release/bundle/nsis/*.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}